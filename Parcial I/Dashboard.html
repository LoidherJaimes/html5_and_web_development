<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Finanzas Pro</title>
    <link rel="stylesheet" href="Dashboard.css">
</head>
<body class="dashboard-body">
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">
                <h2>Finanzas<span>Pro</span></h2>
            </div>
            <nav class="menu">
                <a href="Dashboard.html" class="active">Inicio</a>
                <a href="Ingresos.html">Ingresos</a>
                <a href="Gastos.html">Gastos</a>
                <a href="Reportes.html">Reportes</a>
            </nav>
            <div class="sidebar-footer">
                <a href="Login_1.html">Cerrar Sesión</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <h1>Resumen Financiero</h1>
                <p>Bienvenido de nuevo, Usuario</p>
            </header>

            <section class="stats-grid">
                <div class="card balance">
                    <h3>Saldo Total</h3>
                    <p class="amount">$4,250.00</p>
                    <span class="trend">↑ 12% este mes</span>
                </div>
                <div class="card ingresos">
                    <h3>Ingresos del Mes</h3>
                    <p class="amount">$2,800.00</p>
                </div>
                <div class="card gastos">
                    <h3>Gastos del Mes</h3>
                    <p class="amount">$1,550.00</p>
                </div>
            </section>

            <section class="content-area">
                <div class="table-card">
                    <h3>Actividad Reciente</h3>
                    <div class="placeholder-content">
                        <p>No hay transacciones recientes para mostrar.</p>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
