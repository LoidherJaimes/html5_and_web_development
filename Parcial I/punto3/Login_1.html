<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Finanzas Pro</title>
    <link rel="stylesheet" href="Login_1.css">
</head>
<body>
    <main class="login-container">
        <form class="login-card">
            <h2>Bienvenido</h2>
            <p>Controla tus finanzas hoy</p>
            
            <div class="input-group">
                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" placeholder="Ej: admin123" required>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <a href="Dashboard.html" class="btn-login">Ingresar</a>
        </form>
    </main>
</body>
</html>
