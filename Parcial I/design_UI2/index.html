<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Interfaz 2</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- Barra de navegación superior con pestañas -->
  <nav class="navbar">
    <button class="tab active">INICIO</button>
    <button class="tab">ANÁLISIS</button>
    <button class="tab">DATOS</button>
    <button class="tab">CONFIG</button>
  </nav>

  <!-- Zona central: contenido principal + sidebar -->
  <div class="cuerpo">

    <!-- Cuadrícula 2×2 de paneles de contenido -->
    <main class="content">
      <section class="panel"></section>
      <section class="panel"></section>
      <section class="panel"></section>
      <section class="panel"></section>
    </main>

    <!-- Panel lateral con métricas -->
    <aside class="sidebar">

      <!-- Indicador circular (avatar / stat) -->
      <span class="avatar"></span>

      <!-- Lista de barras de métricas -->
      <ul class="barras">
        <li class="barra-row"><div class="barra-track"><span class="barra-fill br1"></span></div></li>
        <li class="barra-row"><div class="barra-track"><span class="barra-fill br2"></span></div></li>
        <li class="barra-row"><div class="barra-track"><span class="barra-fill br3"></span></div></li>
        <li class="barra-row"><div class="barra-track"><span class="barra-fill br4"></span></div></li>
        <li class="barra-row"><div class="barra-track"><span class="barra-fill br5"></span></div></li>
        <li class="barra-row"><div class="barra-track"><span class="barra-fill br6"></span></div></li>
        <li class="barra-row"><div class="barra-track"><span class="barra-fill br7"></span></div></li>
        <li class="barra-row"><div class="barra-track"><span class="barra-fill br8"></span></div></li>
        <li class="barra-row"><div class="barra-track"><span class="barra-fill br9"></span></div></li>
        <li class="barra-row"><div class="barra-track"><span class="barra-fill br10"></span></div></li>
      </ul>

    </aside>

  </div>

  <!-- Pie de página -->
  <footer class="pie">HTML5 + CSS3 · grid · flexbox · dark UI</footer>

</body>
</html>
